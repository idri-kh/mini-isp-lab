!
version 15.8
service timestamps debug datetime msec
service timestamps log datetime msec
no service password-encryption
!
hostname PE2
!
boot-start-marker
boot-end-marker
!
!
!
no aaa new-model
!
!
!
mmi polling-interval 60
no mmi auto-configure
no mmi pvc
mmi snmp-timeout 180
!
!
!
!
!
!
!
!
!
!
!
ip cef
no ipv6 cef
!
multilink bundle-name authenticated
!
!
!
!
!
redundancy
!
!
! 
!
!
!
!
!
!
!
!
!
!
!
!
interface Loopback0
 no shutdown
 ip address 2.2.2.2 255.255.255.255
!
interface GigabitEthernet0/0
 no shutdown
 ip address 10.0.1.18 255.255.255.252
 duplex auto
 speed auto
 media-type rj45
!
interface GigabitEthernet0/1
 no shutdown
 ip address 10.0.1.21 255.255.255.252
 duplex auto
 speed auto
 media-type rj45
!
interface GigabitEthernet0/2
 no shutdown
 no ip address
 shutdown
 duplex auto
 speed auto
 media-type rj45
!
interface GigabitEthernet0/3
 no shutdown
 no ip address
 shutdown
 duplex auto
 speed auto
 media-type rj45
!
router ospf 110
 network 2.2.2.2 0.0.0.0 area 0
 network 10.0.1.0 0.0.0.255 area 0
!
router bgp 65000
 bgp log-neighbor-changes
 neighbor 5.5.5.5 remote-as 65000
 neighbor 5.5.5.5 update-source Loopback0
 neighbor 10.0.1.17 remote-as 100
 !
 address-family ipv4
  redistribute connected
  neighbor 5.5.5.5 activate
  neighbor 5.5.5.5 next-hop-self
  neighbor 5.5.5.5 route-map TAG-client2 out
  neighbor 10.0.1.17 activate
  neighbor 10.0.1.17 route-map TAG-server out
 exit-address-family
!
ip forward-protocol nd
!
!
no ip http server
no ip http secure-server
!
!
ip prefix-list client2 seq 10 permit 192.168.2.0/24
!
ip prefix-list server1 seq 5 permit 192.168.3.0/24
!
ip prefix-list server2 seq 5 permit 192.168.4.0/24
ipv6 ioam timestamp
!
route-map TAG-client2 permit 10
 match ip address prefix-list client2
 set local-preference 200
!
route-map TAG-server permit 11
 match ip address prefix-list server1
 set as-path prepend 65000 65000
!
route-map TAG-server permit 22
 match ip address prefix-list server2
!
!
!
control-plane
!
banner exec ^C
**************************************************************************
* IOSv is strictly limited to use for evaluation, demonstration and IOS  *
